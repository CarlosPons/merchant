<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilization Trade Board</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Mercaderes y piratas</h1>
        </header>

        <div class="map-container">
            <img src="mapa.png" alt="Mare Mediterranevm" class="map-image">
        </div>

        <div id="statusMessage" class="status"></div>

        <div class="tabs-container">
            <button class="tab-button" data-table="Resource">Mercancías</button>
            <button class="tab-button" data-table="City">Oportunidades</button>
            <button class="tab-button" data-table="CityConnection">Rutas/Destino</button>
            <button class="tab-button active" data-table="Merchant">Mercader</button>
            <button class="tab-button" data-table="Message">Mensajes</button>
            <button class="tab-button" data-table="CityOffer">Comprar/Vender</button>
            <button class="tab-button" data-table="Spy">Espías</button>
        </div>

        <section class="table-container">
            <div id="loading" class="no-data" style="display: none;">Cargando datos desde Supabase...</div>
            <div id="specific-container"></div> 
            <table id="dataTable">
                <thead id="tableHead">
                    <tr><th>Información</th></tr>
                </thead>
                <tbody id="dataBody">
                    <tr><td class="no-data">Haz clic en una pestaña para cargar sus datos.</td></tr>
                </tbody>
            </table>
        </section>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api/fetchStandard.js"></script>
    <script src="js/api/fetchCityConnection.js"></script>
    <script src="js/api/fetchMerchant.js"></script>
    <script src="js/api/fetchSpy.js"></script>
    <script src="js/api/fetchGlobalMessage.js"></script>
    <script src="js/api/fetchCityOffer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
